<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSG Dates 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #2E1F2E;
    --cream: #FBF3EC;
    --blush: #E8A3A3;
    --gold: #D9A441;
    --muted: #8A7B85;
    --line: rgba(46,31,46,0.12);
    --green: #6E9B7A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--plum);
    font-family: 'Work Sans', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(36px, 6vw, 54px);
    letter-spacing: -0.01em;
    text-align: center;
    padding-top: 56px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  .sync-status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }

  .sync-dot.syncing { background: var(--gold); }
  .sync-dot.error { background: #C46A5A; }

  /* --- Countdown --- */
  .countdown {
    margin: 30px auto 0;
    max-width: 560px;
    background: var(--plum);
    color: var(--cream);
    border-radius: 18px;
    padding: 28px 32px;
    text-align: center;
    position: relative;
  }

  .countdown .label {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .countdown-numbers {
    display: flex;
    justify-content: center;
    gap: 24px;
  }

  .countdown-numbers div {
    min-width: 60px;
  }

  .countdown-numbers .num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 38px;
    line-height: 1;
  }

  .countdown-numbers .unit {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blush);
    margin-top: 6px;
  }

  .set-date {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }

  .set-date input,
  .set-date select {
    background: rgba(251,243,236,0.1);
    border: 1px solid rgba(251,243,236,0.3);
    color: var(--cream);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13px;
    color-scheme: dark;
  }

  .no-date {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--cream);
  }

  /* --- Grid of people --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 48px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 2px 10px rgba(46,31,46,0.06);
    text-align: center;
  }

  .photo-upload {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    margin: 0 auto 14px;
    background: var(--cream);
    border: 2px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }

  .photo-upload img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-upload .placeholder {
    font-size: 11px;
    color: var(--muted);
    padding: 0 8px;
  }

  .photo-upload input[type="file"] {
    display: none;
  }

  .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    border: none;
    background: transparent;
    text-align: center;
    width: 100%;
    color: var(--plum);
    margin-bottom: 18px;
  }

  .name:focus { outline: none; border-bottom: 1px solid var(--blush); }

  .counter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .counter-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--cream);
    color: var(--plum);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }

  .counter-btn:hover { background: var(--blush); color: #fff; }

  .count {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 30px;
    min-width: 46px;
  }

  .count-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: -10px;
    margin-bottom: 14px;
  }

  .emoji-row {
    display: flex;
    gap: 6px;
  }

  .emoji-input {
    flex: 1;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    font-size: 18px;
    background: var(--cream);
  }

  .emoji-input:focus { outline: none; border-color: var(--blush); }

  .emoji-pick-btn {
    border: 1px solid var(--line);
    background: var(--cream);
    border-radius: 8px;
    width: 38px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .emoji-pick-btn:hover { background: var(--blush); }

  .emoji-caption {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .emoji-panel {
    position: absolute;
    z-index: 10;
    margin-top: 6px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(46,31,46,0.14);
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    width: 220px;
  }

  .emoji-panel button {
    border: none;
    background: none;
    font-size: 19px;
    padding: 5px;
    border-radius: 6px;
    cursor: pointer;
  }

  .emoji-panel button:hover { background: var(--cream); }

  .emoji-clear {
    grid-column: 1 / -1;
    font-size: 11px !important;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-top: 1px solid var(--line) !important;
    margin-top: 4px;
    padding-top: 8px !important;
  }

  footer {
    text-align: center;
    margin-top: 50px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>HSG Dates 2026</h1>
  <div class="subtitle">Tracking the group's dating year, one L (or dub) at a time</div>
  <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">Synced</span></div>

  <div class="countdown">
    <div class="label">Next date</div>
    <div id="countdownDisplay">
      <div class="no-date">No date set yet</div>
    </div>
    <div class="set-date">
      <label for="nextDateInput">Next date:</label>
      <input type="datetime-local" id="nextDateInput">
      <select id="nextDateWithSelect">
        <option value=""></option>
      </select>
    </div>
  </div>

  <div class="grid" id="peopleGrid"></div>

  <footer>Tap a photo circle to upload · click a name to rename · everyone with this file sees the same data</footer>
</div>

<script>
  // Shared storage: everyone who opens this file reads/writes the same JSON
  // Blob document, so all 6 of you see the same live numbers.
  const BLOB_ID = '019f2f11-3f8f-7e4f-b537-bac65cc71ac8';
  const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/' + BLOB_ID;
  const defaultNames = ['Person 1','Person 2','Person 3','Person 4','Person 5','Person 6'];
  const POLL_MS = 5000;

  function defaultState() {
    return {
      updatedAt: 0,
      nextDate: null,
      nextDateWith: '',
      people: defaultNames.map(name => ({ name, count: 0, emoji: '', photo: null }))
    };
  }

  let state = defaultState();
  let isEditingText = false;

  function setSyncStatus(mode) {
    const dot = document.getElementById('syncDot');
    const text = document.getElementById('syncText');
    dot.className = 'sync-dot' + (mode === 'syncing' ? ' syncing' : mode === 'error' ? ' error' : '');
    text.textContent = mode === 'syncing' ? 'Syncing…' : mode === 'error' ? 'Offline — changes saved locally' : 'Synced with everyone';
  }

  async function fetchState() {
    const activeIsField = document.activeElement && document.activeElement.tagName === 'INPUT';
    if (activeIsField || isEditingText) return; // never fetch mid-edit

    setSyncStatus('syncing');
    try {
      const res = await fetch(BLOB_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const remote = await res.json();
      if ((remote.updatedAt || 0) > (state.updatedAt || 0)) {
        state = remote;
        renderGrid();
        renderCountdown();
        syncDateInput();
      }
      setSyncStatus('ok');
    } catch (e) {
      setSyncStatus('error');
    }
  }

  async function pushState() {
    state.updatedAt = Date.now();
    setSyncStatus('syncing');
    try {
      const res = await fetch(BLOB_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      if (!res.ok) throw new Error('push failed');
      setSyncStatus('ok');
    } catch (e) {
      setSyncStatus('error');
    }
  }

  function syncDateInput() {
    const dateInput = document.getElementById('nextDateInput');
    if (document.activeElement !== dateInput) {
      dateInput.value = state.nextDate || '';
    }
    const withSelect = document.getElementById('nextDateWithSelect');
    if (document.activeElement !== withSelect) {
      const names = state.people.map(p => p.name);
      withSelect.innerHTML = '<option value=""></option>' +
        names.map(n => `<option value="${n}">${n}</option>`).join('');
      withSelect.value = state.nextDateWith || '';
    }
  }

  function renderGrid() {
    const grid = document.getElementById('peopleGrid');
    grid.innerHTML = '';

    state.people.forEach((person, i) => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <label class="photo-upload" for="photo-${i}">
          ${person.photo
            ? `<img src="${person.photo}" alt="${person.name}">`
            : `<span class="placeholder">Add photo</span>`}
          <input type="file" id="photo-${i}" accept="image/*">
        </label>
        <input class="name" id="name-${i}" value="${person.name}">
        <div class="counter-row">
          <button class="counter-btn" data-action="minus" data-index="${i}">−</button>
          <div class="count">${person.count}</div>
          <button class="counter-btn" data-action="plus" data-index="${i}">+</button>
        </div>
        <div class="count-label">Dates in 2026</div>
        <div class="emoji-row" style="position: relative;">
          <input class="emoji-input" id="emoji-${i}" placeholder="" maxlength="20" value="${person.emoji}">
          <button type="button" class="emoji-pick-btn" data-index="${i}">🙂</button>
        </div>
        <div class="emoji-caption">Vibe check</div>
      `;

      grid.appendChild(card);
    });

    grid.querySelectorAll('.counter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        if (btn.dataset.action === 'plus') {
          state.people[idx].count++;
        } else {
          state.people[idx].count = Math.max(0, state.people[idx].count - 1);
        }
        pushState();
        renderGrid();
      });
    });

    grid.querySelectorAll('.name').forEach((input, i) => {
      input.addEventListener('focus', () => isEditingText = true);
      input.addEventListener('blur', () => isEditingText = false);
      input.addEventListener('change', () => {
        state.people[i].name = input.value || defaultNames[i];
        pushState();
        syncDateInput();
      });
    });

    grid.querySelectorAll('.emoji-input').forEach((input, i) => {
      input.addEventListener('focus', () => isEditingText = true);
      input.addEventListener('blur', () => isEditingText = false);
      input.addEventListener('change', () => {
        state.people[i].emoji = input.value;
        pushState();
      });
    });

    grid.querySelectorAll('.emoji-pick-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        toggleEmojiPanel(btn, idx);
      });
    });

    state.people.forEach((person, i) => {
      const fileInput = document.getElementById(`photo-${i}`);
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressImage(file, 140, 140, (dataUrl) => {
          state.people[i].photo = dataUrl;
          pushState();
          renderGrid();
        });
      });
    });
  }

  const EMOJI_OPTIONS = ['❤️','😍','🥰','😂','😭','🙄','😬','💀','🔥','✨','😴','🥱',
                          '💔','🚩','🥂','😳','🙃','👀','😩','🎉','😅','🫠','🤡','💅',
                          '🍝','🐠','🫱\u200d🫲'];

  let openPanel = null;

  function toggleEmojiPanel(btn, idx) {
    if (openPanel) { openPanel.remove(); openPanel = null; }
    const panel = document.createElement('div');
    panel.className = 'emoji-panel';
    panel.innerHTML = EMOJI_OPTIONS.map(e => `<button type="button" data-emoji="${e}">${e}</button>`).join('')
      + `<button type="button" class="emoji-clear" data-clear="1">Clear</button>`;

    panel.querySelectorAll('button[data-emoji]').forEach(b => {
      b.addEventListener('click', () => {
        const input = document.getElementById(`emoji-${idx}`);
        input.value = (input.value || '') + b.dataset.emoji;
        state.people[idx].emoji = input.value;
        pushState();
        panel.remove();
        openPanel = null;
      });
    });
    panel.querySelector('[data-clear]').addEventListener('click', () => {
      const input = document.getElementById(`emoji-${idx}`);
      input.value = '';
      state.people[idx].emoji = '';
      pushState();
      panel.remove();
      openPanel = null;
    });

    btn.parentElement.appendChild(panel);
    openPanel = panel;

    // Close if clicking anywhere else
    setTimeout(() => {
      document.addEventListener('click', function closeOnce(ev) {
        if (!panel.contains(ev.target)) {
          panel.remove();
          if (openPanel === panel) openPanel = null;
          document.removeEventListener('click', closeOnce);
        }
      });
    }, 0);
  }

  // Shrinks photos to keep each stored value safely under kvdb's 16KB-per-key limit.
  // Steps quality down until the encoded image is comfortably small.
  function compressImage(file, maxW, maxH, callback) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        let quality = 0.7;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > 12000 && quality > 0.2) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        callback(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function renderCountdown() {
    const display = document.getElementById('countdownDisplay');
    const withLabel = state.nextDateWith
      ? `<div style="font-size:13px; color: var(--blush); margin-top: -6px; margin-bottom: 14px;">with ${state.nextDateWith}</div>`
      : '';

    if (!state.nextDate) {
      display.innerHTML = `${withLabel}<div class="no-date">No date set yet</div>`;
      return;
    }

    const target = new Date(state.nextDate).getTime();
    const now = Date.now();
    const diff = target - now;

    if (diff <= 0) {
      display.innerHTML = `<div class="no-date">It's date day! 🎉</div>${withLabel}`;
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    display.innerHTML = `
      ${withLabel}
      <div class="countdown-numbers">
        <div><div class="num">${days}</div><div class="unit">Days</div></div>
        <div><div class="num">${hours}</div><div class="unit">Hrs</div></div>
        <div><div class="num">${minutes}</div><div class="unit">Min</div></div>
        <div><div class="num">${seconds}</div><div class="unit">Sec</div></div>
      </div>
    `;
  }

  const dateInput = document.getElementById('nextDateInput');
  dateInput.addEventListener('focus', () => isEditingText = true);
  dateInput.addEventListener('blur', () => isEditingText = false);
  dateInput.addEventListener('change', () => {
    state.nextDate = dateInput.value;
    pushState();
    renderCountdown();
  });

  const withSelect = document.getElementById('nextDateWithSelect');
  withSelect.addEventListener('focus', () => isEditingText = true);
  withSelect.addEventListener('blur', () => isEditingText = false);
  withSelect.addEventListener('change', () => {
    state.nextDateWith = withSelect.value;
    pushState();
    renderCountdown();
  });

  renderGrid();
  renderCountdown();
  syncDateInput();
  fetchState();
  setInterval(renderCountdown, 1000);
  setInterval(fetchState, POLL_MS);
</script>

</body>
</html>
