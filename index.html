<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSG Dates 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --plum: #2E1F2E;
    --cream: #FBF3EC;
    --blush: #E8A3A3;
    --gold: #D9A441;
    --muted: #8A7B85;
    --line: rgba(46,31,46,0.12);
    --green: #6E9B7A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--plum);
    font-family: 'Work Sans', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(36px, 6vw, 54px);
    letter-spacing: -0.01em;
    text-align: center;
    padding-top: 56px;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  .sync-status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }

  .sync-dot.syncing { background: var(--gold); }
  .sync-dot.error { background: #C46A5A; }

  /* --- Summary box --- */
  .summary-box {
    margin: 30px auto 0;
    max-width: 640px;
    background: var(--plum);
    color: var(--cream);
    border-radius: 18px;
    padding: 28px 32px;
    text-align: center;
  }

  .ndb-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--gold);
    margin-bottom: 20px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 18px;
    margin-bottom: 20px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 30px;
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--blush);
    text-align: center;
  }

  .status-breakdown {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .status-chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    background: rgba(251,243,236,0.1);
  }

  .summary-quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--cream);
    border-top: 1px solid rgba(251,243,236,0.14);
    padding-top: 16px;
    line-height: 1.5;
  }

  /* --- Grid of people --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 48px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 2px 10px rgba(46,31,46,0.06);
    text-align: center;
  }

  .photo-upload {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    margin: 0 auto 14px;
    background: var(--cream);
    border: 2px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }

  .photo-upload img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-upload .placeholder {
    font-size: 11px;
    color: var(--muted);
    padding: 0 8px;
  }

  .photo-upload input[type="file"] {
    display: none;
  }

  .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    border: none;
    background: transparent;
    text-align: center;
    width: 100%;
    color: var(--plum);
    margin-bottom: 18px;
  }

  .name:focus { outline: none; border-bottom: 1px solid var(--blush); }

  .counter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .counter-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--cream);
    color: var(--plum);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }

  .counter-btn:hover { background: var(--blush); color: #fff; }

  .count {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 30px;
    min-width: 46px;
  }

  .count-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: -10px;
    margin-bottom: 14px;
  }

  .emoji-row {
    display: flex;
    gap: 6px;
  }

  .emoji-input {
    flex: 1;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    font-size: 18px;
    background: var(--cream);
  }

  .emoji-input:focus { outline: none; border-color: var(--blush); }

  .emoji-pick-btn {
    border: 1px solid var(--line);
    background: var(--cream);
    border-radius: 8px;
    width: 38px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .emoji-pick-btn:hover { background: var(--blush); }

  .emoji-caption {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .status-select {
    margin-top: 16px;
    width: 100%;
    border: none;
    border-radius: 20px;
    padding: 8px 14px;
    font-family: 'Work Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .status-select.status-single {
    background: rgba(110,155,122,0.15);
    color: #4C7A5A;
  }

  .status-select.status-lost-cause {
    background: rgba(138,123,133,0.18);
    color: var(--muted);
  }

  .status-select.status-complicated {
    background: rgba(217,164,65,0.18);
    color: #9C7A2E;
  }

  .status-select.status-taken {
    background: rgba(232,163,163,0.2);
    color: #B85C5C;
  }

  .status-select.status-graduated {
    background: rgba(201,161,93,0.2);
    color: var(--gold);
  }

  .emoji-panel {
    position: absolute;
    z-index: 10;
    margin-top: 6px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(46,31,46,0.14);
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    width: 220px;
  }

  .emoji-panel button {
    border: none;
    background: none;
    font-size: 19px;
    padding: 5px;
    border-radius: 6px;
    cursor: pointer;
  }

  .emoji-panel button:hover { background: var(--cream); }

  .emoji-clear {
    grid-column: 1 / -1;
    font-size: 11px !important;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-top: 1px solid var(--line) !important;
    margin-top: 4px;
    padding-top: 8px !important;
  }

  footer {
    text-align: center;
    margin-top: 50px;
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>HSG Dates 2026</h1>
  <div class="subtitle">Tracking the group's dating year, one L (or dub) at a time</div>
  <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">Synced</span></div>

  <div class="summary-box">
    <div class="ndb-title">2026 So Far</div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="summary-quote" id="summaryQuote"></div>
  </div>

  <div class="grid" id="peopleGrid"></div>

  <footer>Tap a photo circle to upload · click a name to rename · everyone with this file sees the same data</footer>
</div>

<script>
  // Shared storage: everyone who opens this file reads/writes the same Firebase
  // Realtime Database node, so all 6 of you see the same live numbers.
  const DB_URL = 'https://hsgd-9d58c-default-rtdb.firebaseio.com/';
  const DATA_URL = DB_URL + 'hsgdates.json';
  const defaultNames = ['Person 1','Person 2','Person 3','Person 4','Person 5','Person 6'];
  const POLL_MS = 5000;

  function defaultState() {
    return {
      updatedAt: 0,
      nextDate: null,
      nextDateWith: '',
      people: defaultNames.map(name => ({ name, count: 0, emoji: '', photo: null }))
    };
  }

  let state = defaultState();
  let isEditingText = false;

  function setSyncStatus(mode) {
    const dot = document.getElementById('syncDot');
    const text = document.getElementById('syncText');
    dot.className = 'sync-dot' + (mode === 'syncing' ? ' syncing' : mode === 'error' ? ' error' : '');
    text.textContent = mode === 'syncing' ? 'Syncing…' : mode === 'error' ? 'Offline — changes saved locally' : 'Synced with everyone';
  }

  async function fetchState() {
    const activeIsField = document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT');
    if (activeIsField || isEditingText) return; // never fetch mid-edit

    setSyncStatus('syncing');
    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const remote = await res.json();
      if (remote === null) {
        // Nothing saved yet — initialize it with our current (default) state
        await pushState();
      } else if ((remote.updatedAt || 0) > (state.updatedAt || 0)) {
        state = remote;
        renderGrid();
        renderSummary();
      }
      setSyncStatus('ok');
    } catch (e) {
      setSyncStatus('error');
    }
  }

  async function pushState() {
    state.updatedAt = Date.now();
    setSyncStatus('syncing');
    try {
      const res = await fetch(DATA_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      if (!res.ok) throw new Error('push failed');
      setSyncStatus('ok');
    } catch (e) {
      setSyncStatus('error');
    }
  }

  const MOTIVATIONAL_QUOTES = [
    "Every 'no' is just the universe clearing space for a better yes.",
    "Rejection is just redirection — usually toward brunch with the group chat.",
    "You miss 100% of the dates you don't show up to.",
    "Standards are like rent — non-negotiable and worth paying for.",
    "A bad date is just a good story that hasn't been told yet.",
    "Swipe with confidence, text with mystery.",
    "The right person won't require a highlight reel to be impressed.",
    "Some of you need to log off and touch grass — lovingly.",
    "Slow burns are still burns. Keep the flame going.",
    "It's not delusion, it's optimism with a nice outfit on."
  ];
  const chosenQuote = MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)];

  const STATUS_ICONS = {
    'Single': '💚',
    'Lost cause': '💀',
    'Its complicated': '🌀',
    'Taken': '❤️',
    'Graduated': '🎓'
  };

  function renderSummary() {
    const grid = document.getElementById('summaryGrid');

    const totalDates = state.people.reduce((sum, p) => sum + (p.count || 0), 0);

    const spaghettiTotal = state.people.reduce((sum, p) => {
      const matches = (p.emoji || '').match(/🍝/g);
      return sum + (matches ? matches.length : 0);
    }, 0);

    let topPerson = state.people[0];
    state.people.forEach(p => { if (p.count > topPerson.count) topPerson = p; });
    const topLabel = topPerson.count > 0 ? topPerson.name : '—';

    const avg = state.people.length ? (totalDates / state.people.length).toFixed(1) : '0';

    const statusCounts = {};
    Object.keys(STATUS_ICONS).forEach(s => statusCounts[s] = 0);
    state.people.forEach(p => {
      const s = p.status || 'Single';
      if (statusCounts[s] === undefined) statusCounts[s] = 0;
      statusCounts[s]++;
    });

    const chips = Object.keys(STATUS_ICONS)
      .filter(s => statusCounts[s] > 0)
      .map(s => `<span class="status-chip">${STATUS_ICONS[s]} ${statusCounts[s]} ${s}</span>`)
      .join('');

    grid.innerHTML = `
      <div class="stat"><div class="stat-num">${totalDates}</div><div class="stat-label">Total dates</div></div>
      <div class="stat"><div class="stat-num">${spaghettiTotal}</div><div class="stat-label">🍝 Spaghetti count</div></div>
      <div class="stat"><div class="stat-num">${topLabel}</div><div class="stat-label">Most active</div></div>
      <div class="stat"><div class="stat-num">${avg}</div><div class="stat-label">Avg per person</div></div>
      <div class="status-breakdown">${chips}</div>
    `;

    document.getElementById('summaryQuote').textContent = `"${chosenQuote}"`;
  }

  function statusClass(status) {
    if (status === 'Lost cause') return 'lost-cause';
    if (status === 'Its complicated') return 'complicated';
    if (status === 'Taken') return 'taken';
    if (status === 'Graduated') return 'graduated';
    return 'single';
  }

  function renderGrid() {
    const grid = document.getElementById('peopleGrid');
    grid.innerHTML = '';

    state.people.forEach((person, i) => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <label class="photo-upload" for="photo-${i}">
          ${person.photo
            ? `<img src="${person.photo}" alt="${person.name}">`
            : `<span class="placeholder">Add photo</span>`}
          <input type="file" id="photo-${i}" accept="image/*">
        </label>
        <input class="name" id="name-${i}" value="${person.name}">
        <div class="counter-row">
          <button class="counter-btn" data-action="minus" data-index="${i}">−</button>
          <div class="count">${person.count}</div>
          <button class="counter-btn" data-action="plus" data-index="${i}">+</button>
        </div>
        <div class="count-label">Dates in 2026</div>
        <div class="emoji-row" style="position: relative;">
          <input class="emoji-input" id="emoji-${i}" placeholder="" maxlength="20" value="${person.emoji}">
          <button type="button" class="emoji-pick-btn" data-index="${i}">🙂</button>
        </div>
        <div class="emoji-caption">Vibe check</div>
        <select class="status-select status-${statusClass(person.status)}" id="status-${i}">
          <option value="Single" ${person.status === 'Single' || !person.status ? 'selected' : ''}>💚 Single</option>
          <option value="Lost cause" ${person.status === 'Lost cause' ? 'selected' : ''}>💀 Lost cause</option>
          <option value="Its complicated" ${person.status === 'Its complicated' ? 'selected' : ''}>🌀 Its complicated</option>
          <option value="Taken" ${person.status === 'Taken' ? 'selected' : ''}>❤️ Taken</option>
          <option value="Graduated" ${person.status === 'Graduated' ? 'selected' : ''}>🎓 Graduated</option>
        </select>
      `;

      grid.appendChild(card);
    });

    grid.querySelectorAll('.counter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        if (btn.dataset.action === 'plus') {
          state.people[idx].count++;
        } else {
          state.people[idx].count = Math.max(0, state.people[idx].count - 1);
        }
        pushState();
        renderGrid();
        renderSummary();
      });
    });

    grid.querySelectorAll('.name').forEach((input, i) => {
      input.addEventListener('focus', () => isEditingText = true);
      input.addEventListener('blur', () => isEditingText = false);
      input.addEventListener('change', () => {
        state.people[i].name = input.value || defaultNames[i];
        pushState();
        renderSummary();
      });
    });

    grid.querySelectorAll('.emoji-input').forEach((input, i) => {
      input.addEventListener('focus', () => isEditingText = true);
      input.addEventListener('blur', () => isEditingText = false);
      input.addEventListener('change', () => {
        state.people[i].emoji = input.value;
        pushState();
        renderSummary();
      });
    });

    grid.querySelectorAll('.emoji-pick-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        toggleEmojiPanel(btn, idx);
      });
    });

    grid.querySelectorAll('.status-select').forEach((select, i) => {
      select.addEventListener('focus', () => isEditingText = true);
      select.addEventListener('blur', () => isEditingText = false);
      select.addEventListener('change', () => {
        state.people[i].status = select.value;
        pushState();
        renderGrid();
        renderSummary();
      });
    });

    state.people.forEach((person, i) => {
      const fileInput = document.getElementById(`photo-${i}`);
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        compressImage(file, 140, 140, (dataUrl) => {
          state.people[i].photo = dataUrl;
          pushState();
          renderGrid();
          renderSummary();
        });
      });
    });
  }

  const EMOJI_OPTIONS = ['❤️','😍','🥰','😂','😭','🙄','😬','💀','🔥','✨','😴','🥱',
                          '💔','🚩','🥂','😳','🙃','👀','😩','🎉','😅','🫠','🤡','💅',
                          '🍝','🐠','🫱\u200d🫲'];

  let openPanel = null;

  function toggleEmojiPanel(btn, idx) {
    if (openPanel) { openPanel.remove(); openPanel = null; }
    const panel = document.createElement('div');
    panel.className = 'emoji-panel';
    panel.innerHTML = EMOJI_OPTIONS.map(e => `<button type="button" data-emoji="${e}">${e}</button>`).join('')
      + `<button type="button" class="emoji-clear" data-clear="1">Clear</button>`;

    panel.querySelectorAll('button[data-emoji]').forEach(b => {
      b.addEventListener('click', () => {
        const input = document.getElementById(`emoji-${idx}`);
        input.value = (input.value || '') + b.dataset.emoji;
        state.people[idx].emoji = input.value;
        pushState();
        renderSummary();
        panel.remove();
        openPanel = null;
      });
    });
    panel.querySelector('[data-clear]').addEventListener('click', () => {
      const input = document.getElementById(`emoji-${idx}`);
      input.value = '';
      state.people[idx].emoji = '';
      pushState();
      renderSummary();
      panel.remove();
      openPanel = null;
    });

    btn.parentElement.appendChild(panel);
    openPanel = panel;

    // Close if clicking anywhere else
    setTimeout(() => {
      document.addEventListener('click', function closeOnce(ev) {
        if (!panel.contains(ev.target)) {
          panel.remove();
          if (openPanel === panel) openPanel = null;
          document.removeEventListener('click', closeOnce);
        }
      });
    }, 0);
  }

  // Shrinks photos to keep each stored value safely under kvdb's 16KB-per-key limit.
  // Steps quality down until the encoded image is comfortably small.
  function compressImage(file, maxW, maxH, callback) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

        let quality = 0.7;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > 12000 && quality > 0.2) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        callback(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  renderGrid();
  renderSummary();
  fetchState();
  setInterval(fetchState, POLL_MS);
</script>

</body>
</html>
